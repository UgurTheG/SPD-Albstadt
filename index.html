    <!-- Elfsight Instagram Feed -->

    <script>
      (function () {
        function removeElfsightUI() {
          document.querySelectorAll('a[href*="elfsight.com"], .eapps-widget-toolbar, [class*="eapps-link"], [class*="eapps-panel"]').forEach(function (el) { el.remove(); });
