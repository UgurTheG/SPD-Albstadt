<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Preconnect to external origins -->
    <link rel="preconnect" href="https://static.elfsight.com" crossorigin />

    <!-- Dark-mode FOUC prevention (runs synchronously before paint) -->
    <script>
      ;(function () {
        var s = localStorage.getItem('spd-darkmode')
        if (
          s === 'true' ||
          (s === null && window.matchMedia('(prefers-color-scheme: dark)').matches)
        ) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#E3000F" />

    <!-- Primary SEO -->
    <title>SPD Albstadt – Für eine gerechte Stadtpolitik</title>
    <meta
      name="description"
      content="SPD Albstadt – Sozialdemokratische Partei Deutschlands, Ortsverein Albstadt. Aktuelle Nachrichten, Termine, Gemeinderat und Geschichte der SPD in Albstadt."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.spd-albstadt.de/" />
    <link rel="alternate" hreflang="de" href="https://www.spd-albstadt.de/" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.spd-albstadt.de/" />
    <meta property="og:title" content="SPD Albstadt – Für eine gerechte Stadtpolitik" />

      property="og:description"
      content="Aktuelle Nachrichten, Termine und Informationen über den SPD Ortsverein Albstadt. Gemeinsam für eine soziale und zukunftsorientierte Stadtpolitik."

    <meta
      property="og:image"
      content="https://www.spd-albstadt.de/images/kontakt/gruppenbild.webp"
    />
    <meta property="og:image:alt" content="SPD Albstadt – Gruppenbild" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="de_DE" />
    <meta property="og:site_name" content="SPD Albstadt" />

    <!-- Twitter Card -->

    <meta name="twitter:title" content="SPD Albstadt – Für eine gerechte Stadtpolitik" />

      name="twitter:image"

    />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "PoliticalParty",
        "name": "SPD Albstadt",
        "alternateName": "SPD Ortsverein Albstadt",
        "url": "https://www.spd-albstadt.de",
        "logo": "https://www.spd-albstadt.de/spd-logo.svg",
        "image": "https://www.spd-albstadt.de/images/kontakt/gruppenbild.webp",

        "email": "info@spd-albstadt.de",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Stadtgarten 1",
          "addressLocality": "Albstadt",
          "postalCode": "72458",
          "addressCountry": "DE"

          "url": "https://www.spd.de"
        }
      }
    </script>

    <!-- Elfsight branding removal (only active on /aktuelles where the widget loads) -->
